<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Validación</title>
</head>
<body>
  <form id="registroForm">
    <label for="txtnom">Nombre Completo</label>
    <input type="text" name="txtnom" id="txtNombre">
    <div id="txtNombreDiv"></div>

    <label for="txtcorr">Correo Electrónico</label>
    <input type="text" name="txtcorr" id="txtCorreo">
    <div id="txtCorreoDiv"></div>

    <label for="txttele">Teléfono</label>
    <input type="text" name="txttele" id="txtTelefono">
    <div id="txtTelefonoDiv"></div>

    <button type="submit">Enviar</button>
  </form>

  <p id="mensaje"></p>

  <script src="Validacion/validaciones.js"></script>
</body>
</html>
