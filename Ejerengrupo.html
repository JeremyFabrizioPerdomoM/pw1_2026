<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formulario de Contacto</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #202f45;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e5e7eb;
        }
        .form-container {
            width: 420px;
            padding: 40px;
            background-color: #111827;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        h2 {
            margin-bottom: 30px;
            text-align: center;
            font-weight: 500;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #9ca3af;
        }
        input, textarea {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 2px solid #31425e;
            padding: 8px 5px;
            font-size: 15px;
            color: #f9fafb;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            border-bottom-color: #2a2def;
        }
        textarea {
            resize: none;
            height: 90px;
        }
        button {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #d681f8);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            color: #ffffff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.4);
        }

    </style>
</head>
<body>
    <div class="form-container">
        <h2>Contáctanos</h2>
        <form>
            <div class="input-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" placeholder="Tu nombre">
            </div>
            <div class="input-group">
                <label for="email">Correo</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com">
            </div>
            <div class="input-group">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..."></textarea>
            </div>
            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
