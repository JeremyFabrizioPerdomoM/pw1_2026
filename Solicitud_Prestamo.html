<!DOCTYPE html>
<html>
    <head>
        <title>
            Solicitud Préstamo
        </title>
        <meta charset="utf-8" />
        <!--Jeremy Fabrizio Perdomo Motiño - 0801200500864-->
    </head>
    <body>
            <h1>Formulario de Solicitud de Préstamo Estudiantil</h1>
    <p>Complete el siguiente formulario para solicitar el ingreso al programa de préstamos para un estudiante.</p>

    <form action="Solicitud_Prestamo.html" method="get">

        <label for="nombre">Nombre completo:</label><br>
        <input type="text" name="nombre" id="nombre" placeholder="Escribe su nombre completo"><br><br>

        <label for="email">Correo electrónico:</label><br>
        <input type="email" name="email" id="email" placeholder="Escribe su correo electrónico "><br><br>

        <label for="telefono">Número de teléfono:</label><br>
        <input type="text" name="telefono" id="telefono" placeholder="Escribe su numero de teléfono"><br><br>

        <label for="direccion">Dirección actual:</label><br>
        <input type="text" name="direccion" id="direccion" placeholder="Escribe su direccion actual"><br><br>

        <label for="ciudad">Ciudad:</label><br>
        <input type="text" name="ciudad" id="ciudad" placeholder="Escribe su ciudad actual"><br><br>

        <label for="departamento">Departamento:</label><br>
        <select name="departamento" id="departamento">
            <option value="">Seleccione un departamento</option>
            <option value="Francisco Morazán">Francisco Morazán</option>
            <option value="Cortés">Cortés</option>
            <option value="Colón">Colón</option>
            <option value="Atlántida">Atlántida</option>
            <option value="Comayagua">Comayagua</option>
            <option value="Choluteca">Choluteca</option>
            <option value="Santa Bárbara">Santa Bárbara</option>
            <option value="Lempira">Lempira</option>
        </select>
        <br><br>

        <label for="codigo_postal">Código postal:</label><br>
        <input type="text" name="codigo_postal" id="codigo_postal" placeholder="Escribe su codigo postal"><br><br>

        <label>Nivel de educación actual:</label><br>
        <input type="radio" name="nivel_educacion" id="universitario" value="Universitario">
        <label for="universitario">Universitario</label><br>

        <input type="radio" name="nivel_educacion" id="licenciatura" value="Licenciatura">
        <label for="licenciatura">Licenciatura</label><br>

        <input type="radio" name="nivel_educacion" id="maestria" value="Maestría">
        <label for="maestria">Maestría</label><br>

        <input type="radio" name="nivel_educacion" id="doctorado" value="Doctorado">
        <label for="doctorado">Doctorado</label>
        <br><br>

        <label>Programa de estudio:</label><br>
        <input type="radio" name="programa" id="computacion" value="Ciencias de la Computación">
        <label for="computacion">Ciencias de la Computación</label><br>

        <input type="radio" name="programa" id="ingenieria" value="Ingeniería">
        <label for="ingenieria">Ingeniería</label><br>

        <input type="radio" name="programa" id="economia" value="Economía">
        <label for="economia">Economía</label><br>

        <input type="radio" name="programa" id="deportes" value="Deportes">
        <label for="deportes">Deportes</label><br>

        <input type="radio" name="programa" id="otro" value="Otro">
        <label for="otro">Otro</label>
        <br><br>

        <label for="monto">Monto del préstamo solicitado:</label><br>
        <input type="text" name="monto" id="monto" placeholder="Escribe cuanto es el monto que solicita"><br><br>

        <label for="razon">Razón para solicitar el préstamo:</label><br>
        <textarea name="razon" id="razon" placeholder="Escribe tu razón para solicitar el préstamo"></textarea>
        <br><br>

        <button name="btnenviar" type="submit">Enviar Solicitud</button>
        </form>
    </body>
</html>
